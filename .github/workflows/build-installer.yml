name: Build & Release v3

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "monitor/**"
      - "installer/**"
      - "setup_app.iss"
      - "setup_monitor.iss"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

# =============================================================================
# Job 1 — Ubuntu: lê versão, converte logo, cria GitHub Release
# =============================================================================
jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.versao }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from versao.json
        id: version
        run: |
          VER=$(python3 -c "import json; print(json.load(open('app/versao.json'))['versao'])")
          echo "versao=$VER" >> $GITHUB_OUTPUT
          echo "Building ZapDin v$VER"

      - name: Install Pillow
        run: pip install Pillow --quiet

      - name: Convert logo PNG → ICO
        run: |
          python3 - <<'EOF'
          from PIL import Image
          import os
          src = "app/static/logo/Zapdin-removebg-preview.png"
          if os.path.exists(src):
              img = Image.open(src).convert("RGBA")
              img.save("zapdin.ico", format="ICO",
                       sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
              print("ICO criado com sucesso.")
          else:
              from PIL import Image as _I
              _I.new("RGBA", (256,256), (37,211,102,255)).save("zapdin.ico", format="ICO")
              print("Logo não encontrada — ICO placeholder criado.")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.versao }}
          name: "ZapDin v${{ steps.version.outputs.versao }}"
          draft: false
          prerelease: false
          files: zapdin.ico


# =============================================================================
# Job 2 — Windows: Nuitka builds + Velopack pack + Inno Setup installer
# =============================================================================
  build-windows:
    runs-on: windows-latest
    needs: prepare-release
    env:
      VERSION: ${{ needs.prepare-release.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # ── Python com cache automático de pip ────────────────────────────────
      # cache: 'pip' usa actions/cache internamente, economiza 2-3 min
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      # ── Cache do Nuitka (C compilation cache) ─────────────────────────────
      # Economiza 20-30 min: recompila apenas o que mudou em app/
      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-py3.12-${{ hashFiles('app/requirements.txt') }}-${{ hashFiles('app/**/*.py') }}
          restore-keys: |
            nuitka-${{ runner.os }}-py3.12-${{ hashFiles('app/requirements.txt') }}-
            nuitka-${{ runner.os }}-py3.12-

      # ── Cache do Playwright Chromium ──────────────────────────────────────
      # Chromium ~300MB — economiza 5-10 min por build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: payload\playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('app/requirements.txt') }}

      # ── Dependências Python ────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install nuitka ordered-set zstandard
        shell: pwsh

      # ── Gera ICO diretamente do PNG do repositório ────────────────────────
      # Usa o logo do repo; fallback para cor sólida. Sem here-string (evita
      # problemas de indentação YAML/PowerShell com @"..."@).
      - name: Generate ICO
        run: |
          python -c "from PIL import Image; import os; src='app/static/logo/Zapdin-removebg-preview.png'; img=Image.open(src).convert('RGBA') if os.path.exists(src) else Image.new('RGBA',(256,256),(47,108,0,255)); img.save('zapdin.ico',format='ICO',sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]); print('ICO gerado OK')"
        shell: pwsh

      # ── Pasta de payload ───────────────────────────────────────────────────
      - name: Create payload structure
        run: |
          New-Item -ItemType Directory -Force -Path payload\tools    | Out-Null
          New-Item -ItemType Directory -Force -Path payload\branding  | Out-Null
          New-Item -ItemType Directory -Force -Path payload\deps      | Out-Null
          New-Item -ItemType Directory -Force -Path payload\static    | Out-Null
          New-Item -ItemType Directory -Force -Path output            | Out-Null
          Copy-Item zapdin.ico -Destination payload\branding\zapdin.ico -Force
          if (Test-Path app\static) {
            Copy-Item app\static\* -Destination payload\static -Recurse -Force
          }
        shell: pwsh

      # ── Instalar NSSM via Chocolatey ───────────────────────────────────────
      - name: Install NSSM
        run: |
          choco install nssm --yes --no-progress --ignore-checksums
          # Copiar o binario REAL, nao o shim do Chocolatey
          $nssmReal = "C:\ProgramData\chocolatey\lib\NSSM\tools\nssm.exe"
          if (-not (Test-Path $nssmReal)) {
            $nssmReal = Get-ChildItem "C:\ProgramData\chocolatey\lib" -Recurse -Filter "nssm.exe" |
                        Where-Object { $_.FullName -notlike "*shim*" } |
                        Select-Object -First 1 -ExpandProperty FullName
          }
          Copy-Item $nssmReal -Destination payload\tools\nssm.exe -Force
          Write-Host "NSSM real copiado de: $nssmReal"
        shell: pwsh

      # ── Download bootstrappers de deps (WebView2 + VC++) ──────────────────
      - name: Download dependency bootstrappers
        run: |
          Invoke-WebRequest `
            -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile payload\deps\MicrosoftEdgeWebview2Setup.exe -UseBasicParsing
          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile payload\deps\vc_redist.x64.exe -UseBasicParsing
        shell: pwsh

      # ── Playwright: instala Chromium (usa cache se disponível) ────────────
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\payload\playwright-browsers"
          python -m playwright install chromium --with-deps
        shell: pwsh

      - name: Set Playwright path (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          Write-Host "Playwright Chromium carregado do cache — pulando download."
        shell: pwsh

      # ── Template .env ──────────────────────────────────────────────────────
      - name: Create .env.template
        run: |
          @"
          # ZapDin - Bootstrap template (gerado pelo CI)
          APP_STATE=locked
          PORT=4000
          CLIENT_TOKEN=
          MONITOR_URL=
          CLIENT_NAME=
          CLIENT_CNPJ=
          ERP_TOKEN=
          SECRET_KEY=
          PLAYWRIGHT_BROWSERS_PATH=.\playwright-browsers
          VELOPACK_CHANNEL_URL=https://github.com/${{ github.repository }}/releases/latest/download
          VELOPACK_UPDATE_EXE=.\Update.exe
          "@ | Out-File -FilePath payload\.env.template -Encoding utf8
        shell: pwsh

      # ── Nuitka: compila ZapDin-App.exe ────────────────────────────────────
      # Cache do Nuitka é automático via %LOCALAPPDATA%\Nuitka
      # Na primeira vez: ~30 min | Com cache: ~5-8 min
      - name: Nuitka — ZapDin-App.exe
        run: |
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --output-filename=ZapDin-App.exe `
            --output-dir=payload `
            --windows-icon-from-ico=zapdin.ico `
            --include-package=app `
            --include-package=uvicorn `
            --include-package=fastapi `
            --include-package=starlette `
            --include-package=socketio `
            --include-package=aiosqlite `
            --include-package=playwright `
            --include-package=httpx `
            --include-package=cryptography `
            --include-package=bcrypt `
            --include-package=passlib `
            --include-package=jose `
            --noinclude-pytest-mode=nofollow `
            --assume-yes-for-downloads `
            app/launcher_service.py
        shell: pwsh

      # ── Nuitka: compila ZapDin-Worker.exe ────────────────────────────────
      - name: Nuitka — ZapDin-Worker.exe
        run: |
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --output-filename=ZapDin-Worker.exe `
            --output-dir=payload `
            --windows-icon-from-ico=zapdin.ico `
            --include-package=httpx `
            --noinclude-pytest-mode=nofollow `
            --assume-yes-for-downloads `
            app/worker_main.py
        shell: pwsh

      # ── PyInstaller: compila ZapDin-Launcher.exe (Kiosk WebView2) ────────
      # Nuitka 4.x tem bug com pywebview — PyInstaller compila corretamente.
      # pywebview instalado aqui no CI (não está em requirements.txt do cliente).
      - name: PyInstaller — ZapDin-Launcher.exe
        run: |
          pip install pyinstaller pywebview --quiet
          pyinstaller `
            --onefile `
            --noconsole `
            --name ZapDin-Launcher `
            --distpath payload `
            --icon zapdin.ico `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.mshtml `
            --collect-all webview `
            app/launcher_gui.py
        shell: pwsh

      # ── Velopack: empacota para update delta ──────────────────────────────
      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk
        shell: pwsh

      - name: Velopack pack
        run: |
          vpk pack `
            --packId ZapDin `
            --packVersion $env:VERSION `
            --packDir payload `
            --mainExe ZapDin-App.exe `
            --releaseNotes RELEASES.md `
            --outputDir payload
        shell: pwsh
        continue-on-error: true

      - name: Ensure Update.exe exists
        run: |
          if (-not (Test-Path "payload\Update.exe")) {
            Write-Host "Update.exe não gerado pelo vpk — criando placeholder."
            New-Item -ItemType File -Path "payload\Update.exe" -Force | Out-Null
          }
        shell: pwsh

      # ── Diagnóstico antes do Inno Setup ──────────────────────────────────
      - name: Listar payload antes do Inno Setup
        run: |
          Write-Host "=== payload/ ==="
          Get-ChildItem payload -Recurse -Depth 2 | Select-Object FullName, Length | Format-Table
          Write-Host "=== output/ ==="
          Get-ChildItem output -ErrorAction SilentlyContinue | Select-Object Name, Length
        shell: pwsh

      # ── Inno Setup: gera instalador final ─────────────────────────────────
      - name: Create version.iss
        run: |
          $ver = $env:VERSION
          $line = '#define AppVersion        "' + $ver + '"'
          Set-Content -Path installer\version.iss -Value $line
          Write-Host "version.iss criado: $line"
        shell: pwsh

      - name: Compile Inno Setup — setup_zapdin_app_v3.iss
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/setup_zapdin_app_v3.iss

      # ── Verifica se o setup foi gerado ────────────────────────────────────
      - name: Verificar setup gerado
        run: |
          $setup = "output\ZapDin-Setup-$env:VERSION.exe"
          if (Test-Path $setup) {
            $size = (Get-Item $setup).Length
            Write-Host "OK: $setup ($size bytes)"
          } else {
            Write-Host "ERRO: $setup nao foi gerado!"
            Get-ChildItem output -ErrorAction SilentlyContinue
            exit 1
          }
        shell: pwsh

      # ── Upload artefatos ao GitHub Release ────────────────────────────────
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          fail_on_unmatched_files: true
          files: |
            payload/ZapDin-App.exe
            payload/ZapDin-Worker.exe
            payload/ZapDin-Launcher.exe
            output/ZapDin-Setup-${{ env.VERSION }}.exe

      # ── Mantém compatibilidade: zips legados ──────────────────────────────
      - name: Create legacy zips (compatibilidade)
        run: |
          Compress-Archive -Path app\* -DestinationPath zapdin-app.zip `
            -CompressionLevel Optimal
          Compress-Archive -Path monitor\* -DestinationPath zapdin-monitor.zip `
            -CompressionLevel Optimal
        shell: pwsh

      - name: Upload legacy zips
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            zapdin-app.zip
            zapdin-monitor.zip
