name: Build & Release v3

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "monitor/**"
      - "installer/**"
      - "setup_app.iss"
      - "setup_monitor.iss"
  workflow_dispatch:

permissions:
  contents: write

# =============================================================================
# Job 1 — Ubuntu: lê versão, converte logo, cria GitHub Release
# =============================================================================
jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.versao }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from versao.json
        id: version
        run: |
          VER=$(python3 -c "import json; print(json.load(open('app/versao.json'))['versao'])")
          echo "versao=$VER" >> $GITHUB_OUTPUT
          echo "Building ZapDin v$VER"

      - name: Install Pillow
        run: pip install Pillow --quiet

      - name: Convert logo PNG → ICO
        run: |
          python3 - <<'EOF'
          from PIL import Image
          import os
          src = "app/static/logo/Zapdin-removebg-preview.png"
          if os.path.exists(src):
              img = Image.open(src).convert("RGBA")
              img.save("zapdin.ico", format="ICO",
                       sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
              print("ICO criado com sucesso.")
          else:
              # Cria ICO vazio para não quebrar o workflow
              from PIL import Image as _I
              _I.new("RGBA", (256,256), (37,211,102,255)).save("zapdin.ico", format="ICO")
              print("Logo não encontrada — ICO placeholder criado.")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.versao }}
          name: "ZapDin v${{ steps.version.outputs.versao }}"
          draft: false
          prerelease: false
          files: zapdin.ico


# =============================================================================
# Job 2 — Windows: Nuitka builds + Velopack pack + Inno Setup installer
# =============================================================================
  build-windows:
    runs-on: windows-latest
    needs: prepare-release
    env:
      VERSION: ${{ needs.prepare-release.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Dependências Python ────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install nuitka ordered-set zstandard  # Nuitka + compressores
        shell: pwsh

      # ── Download ICO do release ────────────────────────────────────────────
      - name: Download ICO
        run: |
          $url = "https://github.com/${{ github.repository }}/releases/download/v$env:VERSION/zapdin.ico"
          try {
            Invoke-WebRequest -Uri $url -OutFile "zapdin.ico" -UseBasicParsing
          } catch {
            Write-Host "ICO não encontrado na release, criando placeholder."
            New-Item -ItemType File -Path "zapdin.ico" -Force | Out-Null
          }
        shell: pwsh

      # ── Pasta de payload ───────────────────────────────────────────────────
      - name: Create payload structure
        run: |
          New-Item -ItemType Directory -Force -Path payload\tools   | Out-Null
          New-Item -ItemType Directory -Force -Path payload\branding | Out-Null
          New-Item -ItemType Directory -Force -Path payload\deps     | Out-Null
          New-Item -ItemType Directory -Force -Path payload\static   | Out-Null
          New-Item -ItemType Directory -Force -Path output           | Out-Null
          Copy-Item zapdin.ico -Destination payload\branding\zapdin.ico -Force
          if (Test-Path app\static) {
            Copy-Item app\static\* -Destination payload\static -Recurse -Force
          }
        shell: pwsh

      # ── Instalar NSSM via Chocolatey ───────────────────────────────────────
      - name: Install NSSM
        run: |
          choco install nssm --yes --no-progress --ignore-checksums
          $nssmPath = "C:\ProgramData\chocolatey\bin\nssm.exe"
          if (-not (Test-Path $nssmPath)) {
            $nssmPath = (Get-Command nssm -ErrorAction SilentlyContinue).Source
          }
          Copy-Item $nssmPath -Destination payload\tools\nssm.exe -Force
          Write-Host "NSSM copiado de: $nssmPath"
        shell: pwsh

      # ── Download bootstrappers de deps (WebView2 + VC++) ──────────────────
      - name: Download dependency bootstrappers
        run: |
          Invoke-WebRequest `
            -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile payload\deps\MicrosoftEdgeWebview2Setup.exe -UseBasicParsing
          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile payload\deps\vc_redist.x64.exe -UseBasicParsing
        shell: pwsh

      # ── Playwright: instala Chromium e copia para payload ─────────────────
      - name: Install Playwright Chromium
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\payload\playwright-browsers"
          python -m playwright install chromium --with-deps
        shell: pwsh

      # ── Template .env ──────────────────────────────────────────────────────
      - name: Create .env.template
        run: |
          @"
          # ZapDin — Bootstrap template (gerado pelo CI)
          APP_STATE=locked
          PORT=4000
          CLIENT_TOKEN=
          MONITOR_URL=
          CLIENT_NAME=
          CLIENT_CNPJ=
          ERP_TOKEN=
          SECRET_KEY=
          PLAYWRIGHT_BROWSERS_PATH=.\playwright-browsers
          VELOPACK_CHANNEL_URL=https://github.com/${{ github.repository }}/releases/latest/download
          VELOPACK_UPDATE_EXE=.\Update.exe
          "@ | Out-File -FilePath payload\.env.template -Encoding utf8
        shell: pwsh

      # ── Nuitka: compila ZapDin-App.exe (Backend + WhatsApp) ───────────────
      - name: Nuitka — ZapDin-App.exe
        run: |
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --output-filename=ZapDin-App.exe `
            --output-dir=payload `
            --windows-icon-from-ico=zapdin.ico `
            --include-package=app `
            --include-package=uvicorn `
            --include-package=fastapi `
            --include-package=starlette `
            --include-package=socketio `
            --include-package=aiosqlite `
            --include-package=playwright `
            --include-package=httpx `
            --include-package=cryptography `
            --noinclude-pytest-mode=nofollow `
            --assume-yes-for-downloads `
            app/launcher_service.py
        shell: pwsh

      # ── Nuitka: compila ZapDin-Worker.exe (Worker de fila) ────────────────
      - name: Nuitka — ZapDin-Worker.exe
        run: |
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --output-filename=ZapDin-Worker.exe `
            --output-dir=payload `
            --windows-icon-from-ico=zapdin.ico `
            --include-package=httpx `
            --noinclude-pytest-mode=nofollow `
            --assume-yes-for-downloads `
            app/worker_main.py
        shell: pwsh

      # ── Nuitka: compila ZapDin-Launcher.exe (Kiosk WebView2) ──────────────
      - name: Nuitka — ZapDin-Launcher.exe
        run: |
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --output-filename=ZapDin-Launcher.exe `
            --output-dir=payload `
            --windows-icon-from-ico=zapdin.ico `
            --disable-plugin=pywebview `
            --include-module=webview `
            --include-module=webview.platforms.edgechromium `
            --include-module=webview.platforms.mshtml `
            --noinclude-pytest-mode=nofollow `
            --assume-yes-for-downloads `
            app/launcher_gui.py
        shell: pwsh

      # ── Velopack: empacota para update delta ──────────────────────────────
      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk
        shell: pwsh

      - name: Velopack pack
        run: |
          vpk pack `
            --packId ZapDin `
            --packVersion $env:VERSION `
            --packDir payload `
            --mainExe ZapDin-App.exe `
            --releaseNotes RELEASES.md `
            --outputDir payload
        shell: pwsh
        continue-on-error: true   # Não quebra o build se vpk falhar

      # ── Copia Update.exe gerado pelo vpk para payload raiz ───────────────
      - name: Ensure Update.exe exists
        run: |
          # vpk gera Update.exe na packDir; garante que existe
          if (-not (Test-Path "payload\Update.exe")) {
            Write-Host "Update.exe não gerado pelo vpk — criando placeholder."
            New-Item -ItemType File -Path "payload\Update.exe" -Force | Out-Null
          }
        shell: pwsh

      # ── Inno Setup: gera instalador final ─────────────────────────────────
      - name: Compile Inno Setup — setup_zapdin_app_v3.iss
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/setup_zapdin_app_v3.iss
          options: /DAppVersion=${{ env.VERSION }} /O"output"

      # ── Upload artefatos ao GitHub Release ────────────────────────────────
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            payload/ZapDin-App.exe
            payload/ZapDin-Worker.exe
            payload/ZapDin-Launcher.exe
            output/ZapDin-Setup-${{ env.VERSION }}.exe

      # ── Mantém compatibilidade: zips legados ──────────────────────────────
      - name: Create legacy zips (compatibilidade)
        run: |
          Compress-Archive -Path app\* -DestinationPath zapdin-app.zip `
            -CompressionLevel Optimal
          Compress-Archive -Path monitor\* -DestinationPath zapdin-monitor.zip `
            -CompressionLevel Optimal
        shell: pwsh

      - name: Upload legacy zips
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            zapdin-app.zip
            zapdin-monitor.zip
