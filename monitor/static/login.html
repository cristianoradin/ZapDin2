<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZapDin Monitor — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #9DDB30;
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-mid: #8b949e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .logo { width: 140px; object-fit: contain; }
    .subtitle { font-size: .85rem; color: var(--text-mid); }
    h1 { font-size: 1.4rem; font-weight: 600; }
    form { width: 100%; display: flex; flex-direction: column; gap: 1rem; }
    label { font-size: .8rem; color: var(--text-mid); margin-bottom: .2rem; display: block; }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .65rem 1rem;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--green); }
    button {
      margin-top: .5rem;
      padding: .75rem;
      background: var(--green);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    .err {
      background: #2d1a1a;
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: .6rem 1rem;
      font-size: .85rem;
      color: #f85149;
      width: 100%;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo/Zapdin-removebg-preview.png" alt="ZapDin" class="logo" onerror="this.style.display='none'" />
    <div style="text-align:center">
      <h1>ZapDin Monitor</h1>
      <p class="subtitle">Painel Administrativo Central</p>
    </div>
    <div class="err" id="err"></div>
    <form id="loginForm">
      <div>
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
      </div>
      <div>
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit">Entrar</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.style.display = 'none';
      const body = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      };
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          err.textContent = data.detail || 'Credenciais inválidas';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Erro de conexão com o servidor';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
