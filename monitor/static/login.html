<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZapDin Monitor — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #3d7f1f;
      --accent-h:    #306618;
      --accent-soft: #f0f7eb;
      --accent-mid:  #d4edba;
      --bg:          #f4f6f9;
      --surface:     #ffffff;
      --surface2:    #f2f3f5;
      --border:      #e4e6ea;
      --text:        #111318;
      --text-mid:    #6b7280;
      --text-light:  #9ca3af;
      --red:         #dc2626;
      --red-soft:    #fef2f2;
      --red-mid:     #fecaca;
      --shadow-md:   0 4px 20px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg:   0 8px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
      --grad:        linear-gradient(90deg, #3d7f1f 0%, #7cdc44 50%, #3b82f6 100%);
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 65% 45% at 5% 0%, rgba(61,127,31,.07) 0%, transparent 55%),
        radial-gradient(ellipse 55% 40% at 95% 100%, rgba(59,130,246,.05) 0%, transparent 55%);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Barra gradiente no topo */
    .topbar-grad {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--grad);
      z-index: 100;
    }

    /* Wrapper central */
    .wrapper {
      width: 100%;
      max-width: 400px;
      padding: 20px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp .35s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .logo-img {
      width: 220px;
      height: 220px;
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(61,127,31,.2));
    }

    /* Card */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px 28px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    /* Barra gradiente no topo do card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--grad);
    }

    .card-head {
      text-align: center;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -.4px;
      color: var(--text);
    }

    .card-sub {
      font-size: .82rem;
      color: var(--text-light);
      margin-top: 3px;
    }

    /* Formulário */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 5px;
    }

    .input-wrap {
      position: relative;
    }

    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: .65rem 1rem;
      color: var(--text);
      font-size: .925rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      background: #fff;
    }

    /* Botão mostrar/ocultar senha */
    .eye-btn {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 1rem;
      padding: .2rem;
      line-height: 1;
      transition: color .15s;
    }
    .eye-btn:hover { color: var(--text-mid); }

    /* Botão de submit */
    .btn-submit {
      width: 100%;
      padding: .75rem;
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: .95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, box-shadow .2s, transform .1s;
      box-shadow: 0 2px 8px rgba(61,127,31,.28);
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--accent-h);
      box-shadow: 0 4px 14px rgba(61,127,31,.35);
    }

    .btn-submit:active:not(:disabled) { transform: scale(.985); }
    .btn-submit:disabled { opacity: .65; cursor: not-allowed; }

    .btn-submit .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Erro */
    .err-box {
      display: none;
      background: var(--red-soft);
      border: 1.5px solid var(--red-mid);
      border-radius: 8px;
      padding: .65rem .9rem;
      font-size: .835rem;
      font-weight: 500;
      color: var(--red);
      margin-bottom: 14px;
      animation: shake .35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      40%       { transform: translateX(5px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(3px); }
    }

    /* Rodapé */
    .footer {
      margin-top: 28px;
      font-size: .75rem;
      color: var(--text-light);
      text-align: center;
    }
  </style>
</head>
<body>

<div class="topbar-grad"></div>

<div class="wrapper">
  <div class="logo-wrap">
    <img src="/logo/Zapdin-removebg-preview.png"
         alt="ZapDin"
         class="logo-img"
         onerror="this.style.display='none'" />
  </div>

  <div class="card">
    <div class="card-head">
      <div class="card-title">ZapDin Monitor</div>
      <div class="card-sub">Painel Administrativo Central</div>
    </div>

    <div class="err-box" id="errBox"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Usuário</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          placeholder="seu usuário"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
          <button type="button" class="eye-btn" id="eyeBtn" tabindex="-1">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btnLogin">
        <span class="btn-text">Entrar</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <div class="footer">ZapDin © 2025 — Acesso restrito</div>
</div>

<script>
  // Toggle mostrar/ocultar senha
  const eyeBtn  = document.getElementById('eyeBtn');
  const pwdInput = document.getElementById('password');
  eyeBtn.addEventListener('click', () => {
    const show = pwdInput.type === 'password';
    pwdInput.type = show ? 'text' : 'password';
    eyeBtn.textContent = show ? '🙈' : '👁';
  });

  // Submit
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errBox = document.getElementById('errBox');
    const btn    = document.getElementById('btnLogin');

    errBox.style.display = 'none';
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        errBox.textContent  = data.detail || 'Credenciais inválidas. Tente novamente.';
        errBox.style.display = 'block';
        // Re-dispara a animação de shake
        errBox.style.animation = 'none';
        errBox.offsetHeight;
        errBox.style.animation = '';
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    } catch {
      errBox.textContent  = 'Erro de conexão com o servidor.';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
